<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — USIL ERP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/css/tokens.css">
  <link rel="stylesheet" href="../../shared/css/base.css">
  <link rel="stylesheet" href="../../shared/css/layout.css">
  <link rel="stylesheet" href="../../shared/css/components.css">
</head>
<body>

  <app-shell
    active="dashboard"
    page-title="Dashboard"
    page-subtitle="Vista general del sistema">

    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:var(--space-16) var(--space-6);text-align:center;gap:var(--space-4);">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="var(--color-brand-300)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>
      <h2 style="font-size:var(--fs-xl);font-weight:var(--fw-bold);color:var(--color-text-strong);margin:0;">Dashboard en construcción</h2>
      <p style="font-size:var(--fs-md);color:var(--color-text-muted);max-width:400px;margin:0;">
        Este módulo mostrará KPIs y métricas globales del sistema de convalidaciones.
        Disponible en la siguiente iteración.
      </p>
      <a href="/public/modulos/equivalencias/" class="btn btn--primary" style="margin-top:var(--space-2);">
        Ir a Equivalencias
      </a>
    </div>

  </app-shell>

  <script src="../../shared/js/icons.js"></script>
  <script src="../../shared/js/nav-config.js"></script>
  <script src="../../shared/js/app-shell.js"></script>

</body>
</html>
