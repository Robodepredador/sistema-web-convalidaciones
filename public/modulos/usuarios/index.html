<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuarios y Seguridad — USIL ERP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../shared/css/tokens.css">
  <link rel="stylesheet" href="../../../shared/css/base.css">
  <link rel="stylesheet" href="../../../shared/css/layout.css">
  <link rel="stylesheet" href="../../../shared/css/components.css">
  <link rel="stylesheet" href="../../../shared/css/modules/usuarios.css">
</head>
<body>

  <app-shell
    active="usuarios"
    page-title="Usuarios y Seguridad"
    page-subtitle="Gestión de accesos del personal interno y postulantes, con roles y ámbito por facultad."
    page-action="Nuevo Usuario"
    page-action-id="nuevo-usuario">

    <div class="usuarios-layout">
      <!-- MAIN -->
      <div class="main-column">
        <!-- Filtros -->
        <div class="card" style="margin-bottom: var(--space-6); padding: var(--space-5);">
          <div class="filters">
            <div class="field" style="flex: 2;">
              <label class="field__label" for="filter-busqueda">Buscar</label>
              <input type="text" class="field__input" id="filter-busqueda" placeholder="Nombre, correo o DNI">
            </div>
            <div class="field">
              <label class="field__label" for="filter-rol">Rol</label>
              <select class="field__select" id="filter-rol"><option value="">Todos</option></select>
            </div>
            <div class="field">
              <label class="field__label" for="filter-estado">Estado</label>
              <select class="field__select" id="filter-estado">
                <option value="">Todos</option>
                <option value="activo">Activo</option>
                <option value="inactivo">Inactivo</option>
              </select>
            </div>
          </div>
          <div style="display: flex; justify-content: flex-end; gap: var(--space-3); margin-top: var(--space-4);">
            <button class="btn btn--outline" id="filter-clear">Limpiar</button>
            <button class="btn btn--primary" id="filter-apply"><span class="btn__icon" data-icon="search"></span>Buscar</button>
          </div>
        </div>

        <!-- Tabla -->
        <div class="card table-container">
          <div class="table-scroll">
            <table class="data-table">
              <thead>
                <tr>
                  <th>USUARIO</th>
                  <th>DNI</th>
                  <th>ROL</th>
                  <th>ÁMBITO</th>
                  <th class="col-center">ESTADO</th>
                  <th class="col-right">ACCIONES</th>
                </tr>
              </thead>
              <tbody id="table-body">
                <tr><td colspan="6" class="table-empty">Cargando usuarios...</td></tr>
              </tbody>
            </table>
          </div>
          <div class="pagination">
            <span class="pagination__info" id="pagination-info">Mostrando 0 usuarios</span>
            <div class="pagination__pages" id="pagination-pages"></div>
          </div>
        </div>
      </div>

      <!-- SIDEBAR STATS -->
      <div class="stats-sidebar">
        <div class="stat-card-vertical primary">
          <span class="stat-card-vertical__label">TOTAL USUARIOS</span>
          <span class="stat-card-vertical__value" id="stat-total">0</span>
          <span class="stat-card-vertical__desc"><span id="stat-activos">0</span> activos</span>
        </div>
        <div class="stat-card-vertical">
          <span class="stat-card-vertical__label">DISTRIBUCIÓN POR ROL</span>
          <div class="rol-dist" id="rol-dist" style="margin-top: var(--space-3);"></div>
        </div>
      </div>
    </div>
  </app-shell>

  <!-- Modal Crear / Editar -->
  <div class="modal-overlay" id="modal-usuario">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-title">Nuevo Usuario</h3>
        <button class="modal-close" id="modal-close" data-icon="x"></button>
      </div>
      <div class="modal-body">
        <form id="form-usuario">
          <div class="form-grid" style="margin-bottom: var(--space-4);">
            <div class="field">
              <label class="field__label" for="u-nombres">Nombres *</label>
              <input type="text" class="field__input" id="u-nombres" required>
              <span class="field__error" id="err-nombres"></span>
            </div>
            <div class="field">
              <label class="field__label" for="u-apellidos">Apellidos *</label>
              <input type="text" class="field__input" id="u-apellidos" required>
              <span class="field__error" id="err-apellidos"></span>
            </div>
          </div>
          <div class="form-grid" style="margin-bottom: var(--space-4);">
            <div class="field">
              <label class="field__label" for="u-dni">DNI *</label>
              <input type="text" class="field__input" id="u-dni" maxlength="8" placeholder="8 dígitos">
              <span class="field__error" id="err-dni"></span>
            </div>
            <div class="field">
              <label class="field__label" for="u-correo">Correo *</label>
              <input type="email" class="field__input" id="u-correo" placeholder="usuario@usil.edu.pe">
              <span class="field__error" id="err-correo"></span>
            </div>
          </div>
          <div class="form-grid" style="margin-bottom: var(--space-4);">
            <div class="field">
              <label class="field__label" for="u-rol">Rol *</label>
              <select class="field__select" id="u-rol" required><option value="">Seleccionar...</option></select>
              <span class="field__error" id="err-rol"></span>
            </div>
            <div class="field" id="field-facultad" hidden>
              <label class="field__label" for="u-facultad">Ámbito (Facultad) *</label>
              <select class="field__select" id="u-facultad"><option value="">Seleccionar...</option></select>
              <span class="field__error" id="err-facultad"></span>
            </div>
          </div>
          <div class="field" id="field-estado" hidden>
            <label class="field__label" for="u-estado">Estado</label>
            <select class="field__select" id="u-estado">
              <option value="activo">Activo</option>
              <option value="inactivo">Inactivo</option>
            </select>
          </div>
          <div class="ia-note" style="display:flex;align-items:flex-start;gap:var(--space-3);background:var(--color-surface-alt);border-radius:var(--radius-md);padding:var(--space-3) var(--space-4);font-size:var(--fs-sm);color:var(--color-text);margin-top:var(--space-2);">
            <span style="flex-shrink:0;width:18px;height:18px;display:inline-flex" data-icon="info"></span>
            <span>La contraseña no se gestiona en este mockup: en producción la credencial cifrada se enviará al correo del usuario.</span>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn--outline" id="modal-cancel">Cancelar</button>
        <button class="btn btn--primary" id="modal-save">Guardar Usuario</button>
      </div>
    </div>
  </div>

  <script src="../../../shared/js/icons.js"></script>
  <script src="../../../shared/js/nav-config.js"></script>
  <script src="../../../shared/js/app-shell.js"></script>
  <script type="module" src="/public/modulos/usuarios/script.js"></script>
</body>
</html>
