<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Centro IA — USIL ERP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../shared/css/tokens.css">
  <link rel="stylesheet" href="../../../shared/css/base.css">
  <link rel="stylesheet" href="../../../shared/css/layout.css">
  <link rel="stylesheet" href="../../../shared/css/components.css">
  <link rel="stylesheet" href="./centro-ia.css">
</head>
<body>

  <app-shell active="centro-ia"
    page-title="Centro IA"
    page-subtitle="Administra los modelos de inteligencia artificial del sistema."
    page-action="Agregar Modelo"
    page-action-id="btn-agregar-modelo">

    <!-- ── Sección: Bandeja ───────────────────────────────── -->
    <div class="module-section is-active" id="section-bandeja">

      <div class="ia-stats">
        <div class="ia-stat">
          <span class="ia-stat__label">Modelos totales</span>
          <span class="ia-stat__val" id="stat-total">0</span>
        </div>
        <div class="ia-stat">
          <span class="ia-stat__label">Activos</span>
          <span class="ia-stat__val" id="stat-activos">0</span>
        </div>
        <div class="ia-stat">
          <span class="ia-stat__label">Modelo de visión</span>
          <span class="ia-stat__val" style="font-size:var(--fs-md)" id="stat-vision">—</span>
        </div>
      </div>

      <div id="models-container"></div>
    </div>

    <!-- ── Sección: Formulario ────────────────────────────── -->
    <div class="module-section" id="section-form">

      <div class="ia-form-nav">
        <button class="btn btn--outline btn--sm" id="form-back">
          <span class="btn__icon" data-icon="chevronLeft"></span>Volver
        </button>
        <span class="ia-form-nav__title" id="form-title">Agregar Modelo de IA</span>
      </div>

      <form class="ia-form" id="model-form" novalidate>
        <input type="hidden" id="form-model-id">

        <div class="field">
          <label class="field__label" for="f-nombre">Nombre del modelo</label>
          <input class="field__input" id="f-nombre" placeholder="Ej: Llama 3.2 Vision">
          <span class="field__error" data-error-for="f-nombre"></span>
        </div>

        <div class="ia-form-grid">
          <div class="field">
            <label class="field__label" for="f-proveedor">Proveedor</label>
            <select class="field__select" id="f-proveedor">
              <option value="openrouter">OpenRouter</option>
              <option value="together">Together AI</option>
              <option value="nvidia">NVIDIA NIM</option>
              <option value="custom">Personalizado</option>
            </select>
          </div>
          <div class="field">
            <label class="field__label" for="f-model-id">Model ID</label>
            <input class="field__input" id="f-model-id" placeholder="Ej: meta-llama/llama-3.2-11b-vision-instruct">
            <span class="field__error" data-error-for="f-model-id"></span>
          </div>
        </div>

        <div class="field">
          <label class="field__label" for="f-endpoint">Endpoint</label>
          <input class="field__input" id="f-endpoint" placeholder="https://...">
          <span class="provider-hint" id="f-provider-hint"></span>
          <span class="field__error" data-error-for="f-endpoint"></span>
        </div>

        <div class="field">
          <label class="field__label" for="f-api-key">API Key</label>
          <input class="field__input" id="f-api-key" type="password" placeholder="sk-or-v1-...">
          <span class="field__error" data-error-for="f-api-key"></span>
        </div>

        <div class="field">
          <label class="field__label">Capacidades</label>
          <div class="cap-checkboxes">
            <label><input type="checkbox" id="cap-vision" value="vision"> Visión (PDF/imágenes)</label>
            <label><input type="checkbox" id="cap-texto"  value="texto">  Texto</label>
          </div>
        </div>

        <div class="field">
          <label style="display:flex;align-items:center;gap:var(--space-2);cursor:pointer">
            <input type="checkbox" id="f-activo"> Modelo activo
          </label>
        </div>

        <div class="ia-form-footer">
          <button class="btn btn--primary" type="submit">Guardar</button>
          <button class="btn btn--outline" type="button" id="form-cancel">Cancelar</button>
          <div class="test-inline">
            <button class="btn btn--outline btn--sm" type="button" id="form-test">
              <span class="btn__icon" data-icon="check"></span>Probar conexión
            </button>
            <span class="test-inline__result" id="form-test-result"></span>
          </div>
        </div>
      </form>
    </div>

  </app-shell>

  <script src="../../../shared/js/icons.js"></script>
  <script src="../../../shared/js/nav-config.js"></script>
  <script src="../../../shared/js/app-shell.js"></script>
  <script type="module" src="/public/modulos/centro-ia/script.js"></script>
</body>
</html>
