<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Instituciones Externas — USIL ERP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../shared/css/tokens.css">
  <link rel="stylesheet" href="../../../shared/css/base.css">
  <link rel="stylesheet" href="../../../shared/css/layout.css">
  <link rel="stylesheet" href="../../../shared/css/components.css">
  <style>
    .instituciones-layout {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: var(--space-6);
      align-items: start;
    }
    
    @media (max-width: 1024px) {
      .instituciones-layout {
        grid-template-columns: 1fr;
      }
    }
    
    .stats-sidebar {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    .inst-name-cell {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    
    .inst-avatar {
      width: 32px;
      height: 32px;
      background: var(--color-surface-alt);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: var(--fw-bold);
      font-size: var(--fs-sm);
      color: var(--color-brand-800);
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <app-shell
    active="instituciones"
    page-title="Gestión de Instituciones Externas"
    page-subtitle="Administración de instituciones, carreras y mallas curriculares externas"
    page-action="Nueva Institución"
    page-action-id="nueva-institucion">

    <div class="instituciones-layout">
      <!-- MAIN CONTENT -->
      <div class="main-column">
        <!-- Filtros -->
        <div class="card" style="margin-bottom: var(--space-6); padding: var(--space-5);">
          <div class="filters">
            <div class="field" style="flex: 2;">
              <label class="field__label" for="filter-nombre">Nombre de Institución</label>
              <input type="text" class="field__input" id="filter-nombre" placeholder="Ej: Universidad Complutense">
            </div>
            <div class="field">
              <label class="field__label" for="filter-tipo">Tipo de Institución</label>
              <select class="field__select" id="filter-tipo">
                <option value="">Todos</option>
                <option value="UNIVERSIDAD">Universidad</option>
                <option value="INSTITUTO">Instituto</option>
              </select>
            </div>
            <div class="field">
              <label class="field__label" for="filter-estado">Estado</label>
              <select class="field__select" id="filter-estado">
                <option value="">Todos</option>
                <option value="activo">Activo</option>
                <option value="inactivo">Inactivo</option>
              </select>
            </div>
          </div>
          <div style="display: flex; justify-content: flex-end; gap: var(--space-3); margin-top: var(--space-4);">
            <button class="btn btn--outline" id="filter-clear">Limpiar</button>
            <button class="btn btn--primary" id="filter-apply"><span class="btn__icon" data-icon="search"></span>Buscar</button>
          </div>
        </div>

        <!-- Tabla -->
        <div class="card table-container">
          <div class="table-scroll">
            <table class="data-table">
              <thead>
                <tr>
                  <th>TIPO</th>
                  <th>INSTITUCIÓN</th>
                  <th>PAÍS</th>
                  <th class="col-center">CARRERAS</th>
                  <th class="col-center">MALLAS</th>
                  <th>ACTUALIZACIÓN</th>
                  <th class="col-right">ACCIONES</th>
                </tr>
              </thead>
              <tbody id="table-body">
                <tr><td colspan="7" class="table-empty">Cargando instituciones...</td></tr>
              </tbody>
            </table>
          </div>
          <div class="pagination">
            <span class="pagination__info" id="pagination-info">Mostrando 0 instituciones</span>
            <div class="pagination__pages" id="pagination-pages"></div>
          </div>
        </div>
      </div>

      <!-- SIDEBAR STATS -->
      <div class="stats-sidebar">
        <div class="stat-card-vertical primary">
          <span class="stat-card-vertical__label">TOTAL INSTITUCIONES</span>
          <span class="stat-card-vertical__value" id="stat-inst">0</span>
          <span class="stat-card-vertical__desc">+3 este mes</span>
        </div>
        <div class="stat-card-vertical">
          <span class="stat-card-vertical__label">TOTAL CARRERAS</span>
          <span class="stat-card-vertical__value" id="stat-carr">0</span>
          <span class="stat-card-vertical__desc">Registradas globalmente</span>
        </div>
        <div class="stat-card-vertical">
          <span class="stat-card-vertical__label">TOTAL MALLAS</span>
          <span class="stat-card-vertical__value" id="stat-mallas">0</span>
          <span class="stat-card-vertical__desc">Versiones activas</span>
        </div>
      </div>
    </div>
  </app-shell>

  <!-- Modal Nueva Institución -->
  <div class="modal-overlay" id="modal-institucion">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Registrar Institución Externa</h3>
        <button class="modal-close" id="modal-close" data-icon="x"></button>
      </div>
      <div class="modal-body">
        <form id="form-institucion">
          <div class="field" style="margin-bottom: var(--space-4);">
            <label class="field__label" for="inst-nombre">Nombre Oficial *</label>
            <input type="text" class="field__input" id="inst-nombre" required placeholder="Ej: Universidad de Buenos Aires">
            <span class="field__error" id="err-nombre"></span>
          </div>
          <div class="field" style="margin-bottom: var(--space-4);">
            <label class="field__label" for="inst-siglas">Siglas / Acrónimo *</label>
            <input type="text" class="field__input" id="inst-siglas" required placeholder="Ej: UBA">
            <span class="field__error" id="err-siglas"></span>
          </div>
          <div class="form-grid">
            <div class="field">
              <label class="field__label" for="inst-tipo">Tipo de Institución *</label>
              <select class="field__select" id="inst-tipo" required>
                <option value="">Seleccionar...</option>
                <option value="UNIVERSIDAD">Universidad</option>
                <option value="INSTITUTO">Instituto</option>
              </select>
              <span class="field__error" id="err-tipo"></span>
            </div>
            <div class="field">
              <label class="field__label" for="inst-pais">País *</label>
              <select class="field__select" id="inst-pais" required>
                <option value="">Seleccionar...</option>
                <option value="Argentina">Argentina</option>
                <option value="Colombia">Colombia</option>
                <option value="Chile">Chile</option>
                <option value="España">España</option>
                <option value="México">México</option>
                <option value="Perú">Perú</option>
              </select>
              <span class="field__error" id="err-pais"></span>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn--outline" id="modal-cancel">Cancelar</button>
        <button class="btn btn--primary" id="modal-save">Guardar Institución</button>
      </div>
    </div>
  </div>

  <script src="../../../shared/js/icons.js"></script>
  <script src="../../../shared/js/nav-config.js"></script>
  <script src="../../../shared/js/app-shell.js"></script>
  <script type="module" src="/public/modulos/instituciones/script.js"></script>
</body>
</html>
