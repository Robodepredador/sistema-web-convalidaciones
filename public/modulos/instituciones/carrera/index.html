<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Mallas Externas — USIL ERP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../../shared/css/tokens.css">
  <link rel="stylesheet" href="../../../../shared/css/base.css">
  <link rel="stylesheet" href="../../../../shared/css/layout.css">
  <link rel="stylesheet" href="../../../../shared/css/components.css">
  <style>
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-6);
      font-size: var(--fs-md);
      color: var(--color-text);
    }
    .breadcrumb-item {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      background: var(--color-surface-alt);
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-pill);
      color: var(--color-brand-800);
      font-weight: var(--fw-medium);
    }
    .breadcrumb-separator {
      color: var(--color-border);
    }
    
    .carrera-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: var(--space-6);
      align-items: start;
    }
    @media (max-width: 1024px) {
      .carrera-layout { grid-template-columns: 1fr; }
    }
    
    .summary-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .summary-card__header {
      padding: var(--space-4) var(--space-5);
      border-bottom: 1px solid var(--color-border);
      font-weight: var(--fw-bold);
      display: flex;
      align-items: center;
      gap: var(--space-2);
      color: var(--color-brand-800);
    }
    .summary-card__body {
      padding: var(--space-5);
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }
    .summary-stat {
      background: var(--color-surface-alt);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      display: flex;
      align-items: center;
      gap: var(--space-4);
    }
    .summary-stat__icon {
      width: 48px;
      height: 48px;
      background: var(--color-brand-800);
      color: white;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .summary-stat__info {
      display: flex;
      flex-direction: column;
    }
    .summary-stat__label {
      font-size: var(--fs-sm);
      text-transform: uppercase;
      font-weight: var(--fw-semibold);
      color: var(--color-text);
      letter-spacing: 0.5px;
    }
    .summary-stat__value {
      font-size: var(--fs-display-sm);
      font-weight: var(--fw-bold);
      color: var(--color-brand-800);
      line-height: 1.2;
    }
    .summary-footer {
      margin-top: var(--space-2);
      padding-top: var(--space-4);
      border-top: 1px solid var(--color-border);
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
    }
    .summary-footer__label {
      font-size: var(--fs-md);
      font-weight: var(--fw-bold);
      color: var(--color-text-strong);
    }
    .summary-footer__time {
      font-size: var(--fs-sm);
      color: var(--color-text);
      display: flex;
      align-items: center;
      gap: var(--space-1);
    }
    
    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-4);
    }
    .table-header__title {
      font-size: var(--fs-lg);
      font-weight: var(--fw-bold);
      color: var(--color-brand-800);
    }
  </style>
</head>
<body>

  <app-shell
    active="instituciones"
    page-title="Gestión de Mallas Externas"
    page-subtitle=""
    page-action="Nueva Malla"
    page-action-id="nueva-malla">

    <div class="breadcrumb">
      <div class="breadcrumb-item">
        <span data-icon="building"></span>
        <span id="bc-inst">Cargando...</span>
      </div>
      <span class="breadcrumb-separator">/</span>
      <div class="breadcrumb-item" style="background: none; border: 1px solid var(--color-border); color: var(--color-text-strong)">
        <span data-icon="book"></span>
        <span id="bc-carr">Cargando...</span>
      </div>
    </div>

    <div class="carrera-layout">
      <!-- Resumen Left -->
      <div class="summary-card">
        <div class="summary-card__header">
          <span data-icon="doc"></span>Resumen de Registro
        </div>
        <div class="summary-card__body">
          <div class="summary-stat">
            <div class="summary-stat__icon"><span data-icon="list"></span></div>
            <div class="summary-stat__info">
              <span class="summary-stat__label">CURSOS REGISTRADOS</span>
              <span class="summary-stat__value" id="tot-cursos">0</span>
            </div>
          </div>
          <div class="summary-stat">
            <div class="summary-stat__icon" style="background: var(--color-brand-600);"><span data-icon="star"></span></div>
            <div class="summary-stat__info">
              <span class="summary-stat__label">CRÉDITOS TOTALES</span>
              <span class="summary-stat__value" id="tot-creditos">0</span>
            </div>
          </div>
          <div class="summary-footer">
            <span class="summary-footer__label">Última Actualización</span>
            <span class="summary-footer__time"><span data-icon="clock"></span>Hace 15 minutos</span>
            <span class="summary-footer__time" style="margin-top: 4px;">Usuario: J. Perez</span>
          </div>
        </div>
      </div>

      <!-- Tabla Right -->
      <div>
        <div class="table-header">
          <h2 class="table-header__title">Historial de Mallas Registradas (Institución Actual)</h2>
          <select class="field__select" style="width: auto;" id="filter-year">
            <option value="">Filtrar por Año</option>
          </select>
        </div>
        <div class="card table-container">
          <div class="table-scroll">
            <table class="data-table">
              <thead>
                <tr>
                  <th>AÑO / CÓDIGO</th>
                  <th class="col-center">TOTAL CURSOS</th>
                  <th>FECHA REGISTRO</th>
                  <th class="col-center">ESTADO</th>
                  <th class="col-right">ACCIONES</th>
                </tr>
              </thead>
              <tbody id="table-body">
                <tr><td colspan="5" class="table-empty">Cargando mallas...</td></tr>
              </tbody>
            </table>
          </div>
          <div class="pagination">
            <span class="pagination__info" id="pagination-info">Mostrando 0 mallas</span>
            <div class="pagination__pages" id="pagination-pages"></div>
          </div>
        </div>
      </div>
    </div>

    <div style="margin-top: var(--space-8)">
      <button class="btn btn--outline" id="btn-back"><span class="btn__icon" data-icon="arrowLeft"></span>Atrás</button>
    </div>

  </app-shell>

  <script src="../../../../shared/js/icons.js"></script>
  <script src="../../../../shared/js/nav-config.js"></script>
  <script src="../../../../shared/js/app-shell.js"></script>
  <script type="module" src="./script.js"></script>
</body>
</html>
